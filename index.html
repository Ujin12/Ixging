<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ixging Queue App + Credit</title>
  <style>
    :root {
      --bg1: #fff7fa;
      --bg2: #fde8ef;
      --panel: rgba(255,255,255,0.88);
      --panel-2: rgba(255,245,249,0.95);
      --pink: #f3b8ca;
      --pink-2: #e8a8bc;
      --text: #8e6572;
      --text-soft: #c99aaa;
      --line: rgba(243, 184, 202, 0.35);
      --shadow: 0 16px 40px rgba(241, 176, 197, 0.22);
      --radius-lg: 24px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      min-height: 100vh;
      padding: 14px;
    }
    .wrap { max-width: 760px; margin: 0 auto; }
    .notice {
      background: rgba(255,255,255,0.7);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: 999px;
      padding: 10px 18px;
      display: inline-block;
      box-shadow: var(--shadow);
      font-weight: 800;
      color: var(--pink-2);
      margin-bottom: 12px;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      align-items: start;
    }
    .phone {
      background: rgba(255,255,255,0.75);
      border: 10px solid rgba(255,255,255,0.95);
      border-radius: 42px;
      box-shadow: var(--shadow);
      padding: 14px;
      min-height: 760px;
      position: relative;
      overflow: hidden;
    }
    .notch {
      width: 180px;
      height: 24px;
      background: rgba(255,255,255,0.9);
      border-radius: 999px;
      margin: 0 auto 10px;
      position: relative;
    }
    .notch:after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--pink);
      position: absolute;
      right: 28px;
      top: 8px;
    }
    .card {
      background: var(--panel);
      border: 2px solid rgba(255,255,255,0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 14px;
    }
    .hero {
      background: linear-gradient(180deg, #ffeef4, #ffe4ee);
      position: relative;
      overflow: hidden;
      min-height: 190px;
    }
    .cloud { position: absolute; border-radius: 999px; background: rgba(255,255,255,0.85); }
    .cloud.c1 { width: 90px; height: 42px; left: 16px; top: 48px; }
    .cloud.c2 { width: 120px; height: 54px; left: 70px; top: 38px; }
    .cloud.c3 { width: 80px; height: 38px; right: 36px; top: 52px; }
    .cloud.c4 { width: 110px; height: 50px; right: 100px; top: 44px; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .brand { font-weight: 900; font-size: 28px; color: var(--pink-2); }
    .admin {
      background: #fff7fb;
      color: var(--text-soft);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
    }
    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background-size: cover;
      background-position: center;
      border: 3px solid rgba(255,255,255,0.95);
      box-shadow: 0 8px 20px rgba(241,176,197,0.25);
      background-image: url('https://images.unsplash.com/photo-1544717305-2782549b5136?q=80&w=300&auto=format&fit=crop');
    }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .mini-title { font-size: 11px; font-weight: 800; color: var(--text-soft); letter-spacing: 1px; text-transform: uppercase; }
    .big-num { font-size: 54px; font-weight: 900; color: var(--pink-2); line-height: 1; margin: 8px 0; }
    .tiny { font-size: 12px; color: var(--text-soft); }
    .section-title { margin: 14px 0 8px; font-weight: 900; letter-spacing: 2px; color: var(--text-soft); font-size: 12px; }
    .task-list, .credit-list { display: flex; flex-direction: column; gap: 10px; }
    .task {
      display: grid;
      grid-template-columns: 4px 1fr auto;
      gap: 12px;
      align-items: center;
      background: var(--panel-2);
      border-radius: 20px;
      padding: 12px;
      border: 2px solid rgba(255,255,255,0.9);
    }
    .task-line { height: 100%; border-radius: 999px; background: #b7d8ff; }
    .task-name { font-size: 14px; font-weight: 900; color: var(--pink-2); }
    .task-meta { font-size: 12px; margin-top: 4px; }
    .task-right { text-align: right; }
    .tag { background:#eef6ff; color:#9ab8db; border-radius:999px; padding:4px 8px; font-size:11px; font-weight:800; display:inline-block; }
    .calendar {
      margin-top: 14px;
      background: rgba(255,255,255,0.85);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .cal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; font-weight:900; color: var(--pink-2); }
    .days, .dates { display:grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align:center; }
    .days div { font-size: 11px; color: var(--text-soft); font-weight: 800; }
    .dates div { padding: 10px 0; border-radius: 14px; font-size: 13px; font-weight: 700; }
    .today { background: var(--pink); color: white; box-shadow: 0 8px 20px rgba(243,184,202,0.35); }
    .hasq { background: #fff3f7; }
    .credit-card {
      background: rgba(255,255,255,0.9);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      appearance:none;
      -webkit-appearance:none;
    }
    .credit-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: linear-gradient(180deg, #fff0f5, #ffe4ee);
    }
    .credit-body { padding: 14px; }
    .credit-title { font-weight: 900; color: var(--pink-2); font-size: 15px; }
    .credit-text { font-size: 13px; margin-top: 6px; line-height: 1.6; white-space: pre-wrap; }
    .credit-meta { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top: 10px; }
    .credit-date { font-size: 11px; color: var(--text-soft); }
    .bottom-nav { position: sticky; bottom: 0; margin-top: 16px; display:flex; justify-content:center; }
    .navbox {
      background: rgba(255,255,255,0.92);
      border: 2px solid rgba(255,255,255,0.95);
      border-radius: 999px;
      display:flex;
      align-items:center;
      gap: 18px;
      padding: 10px 22px;
      box-shadow: var(--shadow);
    }
    .navbtn { font-size: 21px; color: var(--text-soft); cursor: pointer; user-select:none; border:none; background:transparent; appearance:none; -webkit-appearance:none; }
    .navbtn.active { color: var(--pink-2); }
    .plus {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.95);
      background: linear-gradient(180deg, var(--pink), var(--pink-2));
      color:white;
      display:grid;
      place-items:center;
      font-size: 32px;
      font-weight: 300;
      margin-top: -28px;
      cursor: pointer;
      box-shadow: var(--shadow);
    }
    .side { display:flex; flex-direction:column; gap: 16px; }
    .side .card { padding: 18px; }
    .form-title { text-align:center; font-size: 26px; font-weight: 900; color: var(--pink-2); }
    .subtext { text-align:center; color: var(--text-soft); font-size: 13px; margin-top: 4px; }
    .toggle { display:flex; justify-content:space-between; align-items:center; background:#fff9fc; border-radius:999px; padding: 8px 12px; margin: 14px 0; border: 1px solid var(--line); }
    .switch { width: 48px; height: 24px; border-radius:999px; background:#eee; position:relative; cursor:pointer; border:none; appearance:none; -webkit-appearance:none; }
    .switch:after {
      content:'';
      width:18px;
      height:18px;
      border-radius:50%;
      background:white;
      position:absolute;
      left:3px;
      top:3px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: .2s;
    }
    .switch.on { background: #f9c8d7; }
    .switch.on:after { left: 27px; }
    .field { margin-bottom: 10px; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.85);
      border-radius: 18px;
      padding: 14px;
      color: var(--text);
      outline: none;
      font-family: inherit;
    }
    .field textarea { resize: vertical; min-height: 84px; }
    .btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px;
      font-weight: 900;
      cursor: pointer;
      background: linear-gradient(180deg, var(--pink), var(--pink-2));
      color: white;
      box-shadow: var(--shadow);
    }
    .btn.secondary { background: white; color: var(--pink-2); border: 1px solid var(--line); box-shadow: none; }
    .mini-actions { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .toolbar { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .modebox { display:flex; gap: 10px; }
    .pill { flex:1; padding: 10px; border-radius: 999px; text-align:center; font-weight: 900; cursor: pointer; background: #fff; border: 1px solid var(--line); }
    .pill.active { background: linear-gradient(180deg, #ffeef4, #ffdce7); color: var(--pink-2); }
    .hidden { display:none !important; }
    @media (max-width: 980px) {
      .layout { grid-template-columns: 1fr; }
      .phone { min-height: auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="notice">📱 เว็บแอพจัดการคิว + หน้าเครดิตผลงาน • Ixging</div>
    <div class="layout">
      <div>
        <div class="phone">
          <div class="notch"></div>
          <div class="topbar card" style="padding:12px 14px;">
            <div>
              <div class="brand" id="brandName">Ixging ʚìɞ</div>
              <div class="tiny">— CHECK Q</div>
            </div>
            <div style="display:flex; align-items:center; gap:10px;">
              <div class="admin" id="modeLabel">ADMIN</div>
              <div class="avatar" id="avatar"></div>
            </div>
          </div>

          <div class="hero card" id="hero" style="background-image:url(''); background-size:cover; background-position:center center;">
            <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div><div class="cloud c4"></div>
          </div>

          <div class="grid2">
            <div class="card">
              <div class="mini-title">Next Queue</div>
              <div class="big-num" id="todayCount">0</div>
              <div class="tiny" id="todayText">คิววันนี้</div>
            </div>
            <div class="card">
              <div class="mini-title">Current Queue</div>
              <div class="big-num" id="currentQueue">-</div>
              <div class="tiny" id="currentName">ยังไม่มีคิว</div>
            </div>
          </div>

          <div id="listSection">
            <div class="section-title">TODAY'S TASK</div>
            <div id="listView"><div class="task-list" id="taskList"></div></div>
          </div>

          <div id="calendarView" class="calendar hidden">
            <div class="cal-head">
              <span id="monthLabel">Month</span>
              <span id="freeDays">ว่าง 0 วัน</span>
            </div>
            <div class="days">
              <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
            </div>
            <div class="dates" id="calendarDates"></div>
          </div>

          <div id="creditView" class="hidden">
            <div class="section-title">CREDIT / PORTFOLIO</div>
            <div class="credit-list" id="creditList"></div>
          </div>

          <div class="bottom-nav">
            <div class="navbox">
              <button type="button" class="navbtn active" id="navHome">⌂</button>
              <button type="button" class="navbtn" id="navCal">☷</button>
              <button type="button" class="navbtn" id="navCredit">★</button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const KEY = 'ixging-queue-app-v2';
    const BRAND_KEY = 'ixging-branding-v2';
    const API_URL = 'https://script.google.com/macros/s/AKfycbxg5nQAJF4NxDB7hyfirthwDscghm_D40ZmvNShvB6qp48grUBz0pLHSwvabx5P9DUHGg/exec';

    let state = JSON.parse(localStorage.getItem(KEY) || '{"mode":"guest","urgent":false,"queues":[],"credits":[],"view":"list"}');
    let branding = JSON.parse(localStorage.getItem(BRAND_KEY) || '{"brand":"Ixging ʚìɞ","avatar":"","cover":""}');
    let pendingCreditImage = '';
    let pendingAvatarImage = '';
    let pendingCoverImage = '';

    function saveState() {
      localStorage.setItem(KEY, JSON.stringify(state));
      localStorage.setItem(BRAND_KEY, JSON.stringify(branding));
    }

    async function apiGet(action = 'all') {
      const res = await fetch(`${API_URL}?action=${action}`);
      return await res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return await res.json();
    }

    function toBool(value) {
      if (value === true || value === false) return value;
      if (typeof value === 'string') {
        return value.toLowerCase() === 'true';
      }
      return !!value;
    }

    async function loadFromServer() {
      try {
        const result = await apiGet('all');
        if (!result.ok) throw new Error(result.message || 'โหลดข้อมูลไม่สำเร็จ');

        state.queues = (result.queues || []).map(q => ({
          ...q,
          urgent: toBool(q.urgent),
          id: String(q.id || Date.now())
        }));

        state.credits = (result.credits || []).map(c => ({
          ...c,
          id: String(c.id || Date.now())
        }));

        const s = result.settings || {};
        branding.brand = s.brand || 'Ixging ʚìɞ';
        branding.avatar = s.avatar || '';
        branding.cover = s.cover || '';

        saveState();
        render();
      } catch (err) {
        alert('โหลดข้อมูลจาก Google Sheet ไม่สำเร็จ');
        render();
      }
    }

    function formatDateThai(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('th-TH', { day:'2-digit', month:'2-digit', year:'2-digit' });
    }

    function formatDateTime(ts) {
      return new Date(ts).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' });
    }

    function todayISO() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function addDays(n) {
      const d = new Date();
      d.setDate(d.getDate() + n);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function toggleUrgent() { return; }

    async function addQueue() { return; }

    async function __hiddenAddQueue() {
      const jobType = document.getElementById('jobType').value.trim();
      const channel = document.getElementById('channel').value.trim() || 'Facebook';
      const detail = document.getElementById('detail').value.trim();
      const deadline = document.getElementById('deadline').value || todayISO();

      if (!jobType) {
        alert('กรอกประเภทงานก่อนนะ');
        return;
      }

      const result = await apiPost({
        action: 'addQueue',
        id: Date.now(),
        customer: 'เทส',
        jobType,
        channel,
        detail,
        deadline,
        urgent: state.urgent,
        status: 'waiting'
      });

      if (!result.ok) {
        alert('บันทึกคิวไม่สำเร็จ');
        return;
      }

      document.getElementById('customerName').value = '';
      document.getElementById('jobType').value = '';
      document.getElementById('detail').value = '';
      document.getElementById('deadline').value = '';
      state.urgent = false;
      document.getElementById('urgentSwitch').classList.remove('on');
      await loadFromServer();
    }

    async function addCredit() { return; }

    async function __hiddenAddCredit() {
      const type = document.getElementById('creditType').value;
      const title = document.getElementById('creditTitle').value.trim();
      const imageLink = document.getElementById('creditImage').value.trim();
      const text = document.getElementById('creditText').value.trim();
      const image = pendingCreditImage || imageLink;

      if (!title && !image && !text) {
        alert('ใส่อย่างน้อย 1 อย่างก่อนนะ');
        return;
      }

      const result = await apiPost({
        action: 'addCredit',
        id: Date.now(),
        type,
        title: title || type,
        image,
        text
      });

      if (!result.ok) {
        alert('เพิ่มเครดิตไม่สำเร็จ');
        return;
      }

      document.getElementById('creditTitle').value = '';
      document.getElementById('creditImage').value = '';
      document.getElementById('creditImageFile').value = '';
      document.getElementById('creditText').value = '';
      pendingCreditImage = '';
      await loadFromServer();
      showView('credit');
    }

    async function removeCredit(id) { return; }

    async function __hiddenRemoveCredit(id) {
      if (!confirm('ลบรายการเครดิตนี้ใช่ไหม?')) return;
      const result = await apiPost({ action: 'deleteCredit', id });
      if (!result.ok) {
        alert('ลบเครดิตไม่สำเร็จ');
        return;
      }
      await loadFromServer();
    }

    function setMode(mode) { return; }

    function toggleAdminPanel() { return; }

    function applyView(type) {
      const list = document.getElementById('listSection');
      const cal = document.getElementById('calendarView');
      const credit = document.getElementById('creditView');
      document.getElementById('navHome').classList.toggle('active', type === 'list');
      document.getElementById('navCal').classList.toggle('active', type === 'calendar');
      document.getElementById('navCredit').classList.toggle('active', type === 'credit');
      list.classList.toggle('hidden', type !== 'list');
      cal.classList.toggle('hidden', type !== 'calendar');
      credit.classList.toggle('hidden', type !== 'credit');
    }

    function showView(type) {
      state.view = type;
      saveState();
      applyView(type);
    }

    async function setStatus(id, status) { return; }

    async function __hiddenSetStatus(id, status) {
      const result = await apiPost({ action: 'updateQueueStatus', id, status });
      if (!result.ok) {
        alert('อัปเดตสถานะไม่สำเร็จ');
        return;
      }
      await loadFromServer();
    }

    async function removeQueue(id) { return; }

    async function __hiddenRemoveQueue(id) {
      if (!confirm('ลบคิวนี้ใช่ไหม?')) return;
      const result = await apiPost({ action: 'deleteQueue', id });
      if (!result.ok) {
        alert('ลบคิวไม่สำเร็จ');
        return;
      }
      await loadFromServer();
    }

    function getTodayQueues() {
      const today = todayISO();
      return state.queues.filter(q => q.deadline === today && q.status !== 'done');
    }

    function getCurrentQueue() {
      return state.queues.find(q => q.status === 'serving') || null;
    }

    function getFreeDaysThisMonth() {
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const booked = new Set(
        state.queues
          .filter(q => q.status !== 'done')
          .map(q => q.deadline)
          .filter(Boolean)
          .filter(d => new Date(d + 'T00:00:00').getMonth() === m)
      );
      return Math.max(0, daysInMonth - booked.size);
    }

    function renderCalendar() {
      const container = document.getElementById('calendarDates');
      const now = new Date();
      const y = now.getFullYear();
      const m = now.getMonth();
      const firstDay = new Date(y, m, 1).getDay();
      const daysInMonth = new Date(y, m + 1, 0).getDate();
      const today = new Date().getDate();

      const booked = new Set(
        state.queues
          .filter(q => q.status !== 'done')
          .map(q => q.deadline)
          .filter(Boolean)
          .filter(d => new Date(d + 'T00:00:00').getMonth() === m)
          .map(d => new Date(d + 'T00:00:00').getDate())
      );

      document.getElementById('monthLabel').textContent = now.toLocaleDateString('en-US', { month:'long', year:'numeric' });
      document.getElementById('freeDays').textContent = `ว่าง ${getFreeDaysThisMonth()} วัน`;

      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push('<div></div>');
      for (let d = 1; d <= daysInMonth; d++) {
        let cls = '';
        if (d === today) cls = 'today';
        else if (booked.has(d)) cls = 'hasq';
        cells.push(`<div class="${cls}">${d}</div>`);
      }
      container.innerHTML = cells.join('');
    }

    async function applyBranding() { return; }

    async function __hiddenApplyBranding() {
      const brand = document.getElementById('brandInput').value.trim() || 'Ixging ʚìɞ';
      const avatar = pendingAvatarImage || document.getElementById('avatarInput').value.trim();
      const cover = pendingCoverImage || document.getElementById('coverInput').value.trim();

      const result = await apiPost({
        action: 'saveSettings',
        settings: { brand, avatar, cover }
      });

      if (!result.ok) {
        alert('บันทึกหน้าตาเว็บไม่สำเร็จ');
        return;
      }

      pendingAvatarImage = '';
      pendingCoverImage = '';
      await loadFromServer();
    }

    async function loadDemoData() { return; }

    async function __hiddenLoadDemoData() {
      const demoQueues = [
        { id: Date.now() + 1, customer: 'เทส', jobType: 'ป้ายแอพพ์', channel: 'Facebook', detail: '20 เรฟ', deadline: todayISO(), urgent: false, status: 'serving' },
        { id: Date.now() + 2, customer: 'เทส', jobType: 'Commission', channel: 'Discord', detail: '1 ตัวละคร', deadline: todayISO(), urgent: true, status: 'waiting' },
        { id: Date.now() + 3, customer: 'เทส', jobType: 'Banner', channel: 'Line', detail: 'โทนชมพู', deadline: addDays(2), urgent: false, status: 'waiting' }
      ];

      const demoCredits = [
        { id: Date.now() + 11, type: 'ผลงาน', title: 'ตัวอย่างงานล่าสุด', image: 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop', text: 'ตัวอย่างข้อความอธิบายผลงาน ใส่รายละเอียดงานหรือรีวิวสั้น ๆ ได้' },
        { id: Date.now() + 12, type: 'สลิป', title: 'ตัวอย่างสลิปยืนยัน', image: 'https://images.unsplash.com/photo-1554224155-6726b3ff858f?q=80&w=1200&auto=format&fit=crop', text: 'ใช้โชว์หลักฐานการโอนหรือเครดิตจากลูกค้า' }
      ];

      await apiPost({ action: 'saveSettings', settings: { brand: 'Ixging ʚìɞ', avatar: branding.avatar || '', cover: branding.cover || '' } });
      for (const item of demoQueues) {
        await apiPost({ action: 'addQueue', ...item });
      }
      for (const item of demoCredits) {
        await apiPost({ action: 'addCredit', ...item });
      }
      await loadFromServer();
    }

    function saveBackup() { return; }

    function resetData() { return; }

    function renderCredits() {
      const creditList = document.getElementById('creditList');
      if (!state.credits.length) {
        creditList.innerHTML = '<div class="card" style="text-align:center; color:var(--text-soft);">ยังไม่มีเครดิต ลองเพิ่มรูปผลงาน สลิป หรือข้อความรีวิว 💖</div>';
        return;
      }

      creditList.innerHTML = state.credits.map(item => {
        const delBtn = false && state.mode === 'admin'
          ? `<button onclick="removeCredit(${item.id})" style="border:none;border-radius:999px;padding:7px 10px;background:#fff;color:#d9a0b1;font-weight:800;cursor:pointer;">ลบ</button>`
          : '';

        const image = item.image
          ? `<img class="credit-img" src="${item.image}" alt="${item.title.replace(/"/g, '&quot;')}">`
          : '<div class="credit-img" style="display:grid;place-items:center;color:#d7a4b4;font-weight:900;">NO IMAGE</div>';

        return `<div class="credit-card">
          ${image}
          <div class="credit-body">
            <div class="credit-title">${item.title || item.type}</div>
            <div class="credit-text">${item.text || '-'}</div>
            <div class="credit-meta">
              <div>
                <span class="tag">${item.type}</span>
                <div class="credit-date">${formatDateTime(item.createdAt)}</div>
              </div>
              ${delBtn}
            </div>
          </div>
        </div>`;
      }).join('');
    }

    function render() {
      document.getElementById('urgentSwitch').classList.toggle('on', !!state.urgent);
      state.mode = 'guest';
      document.getElementById('modeLabel').textContent = 'VISITOR';

      document.getElementById('brandName').textContent = branding.brand || 'Ixging ʚìɞ';
      document.getElementById('brandInput').value = branding.brand || 'Ixging ʚìɞ';
      document.getElementById('avatarInput').value = branding.avatar || '';
      document.getElementById('coverInput').value = branding.cover || '';

      if (branding.avatar) {
        document.getElementById('avatar').style.backgroundImage = `url('${branding.avatar}')`;
      }
      if (branding.cover) {
        document.getElementById('hero').style.backgroundImage = `url('${branding.cover}')`;
      }

      const current = getCurrentQueue();
      const todayQueues = getTodayQueues();
      document.getElementById('todayCount').textContent = todayQueues.length;
      document.getElementById('todayText').textContent = todayQueues.length ? 'คิววันนี้' : 'วันนี้ว่าง';
      document.getElementById('currentQueue').textContent = current ? current.customer : '-';
      document.getElementById('currentName').textContent = current ? `${current.jobType} • ${current.channel}` : 'ยังไม่มีคิว';

      const sorted = [...state.queues].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
      const taskList = document.getElementById('taskList');
      if (!sorted.length) {
        taskList.innerHTML = '<div class="card" style="text-align:center; color:var(--text-soft);">ยังไม่มีคิว ลองกด “ใส่ข้อมูลตัวอย่าง” หรือเพิ่มคิวใหม่ 💖</div>';
      } else {
        taskList.innerHTML = sorted.map(q => {
          const adminActions = false && state.mode === 'admin'
            ? `<div style="margin-top:8px; display:flex; gap:6px; justify-content:flex-end; flex-wrap:wrap;">
                <button onclick="setStatus(${q.id}, 'serving')" style="border:none;border-radius:999px;padding:6px 8px;background:#fff3f7;color:#d98ea5;font-weight:800;cursor:pointer;">กำลังทำ</button>
                <button onclick="setStatus(${q.id}, 'done')" style="border:none;border-radius:999px;padding:6px 8px;background:#f4fff6;color:#6eb78a;font-weight:800;cursor:pointer;">เสร็จ</button>
                <button onclick="removeQueue(${q.id})" style="border:none;border-radius:999px;padding:6px 8px;background:#fff;color:#d9a0b1;font-weight:800;cursor:pointer;">ลบ</button>
              </div>`
            : '';

          return `<div class="task">
            <div class="task-line"></div>
            <div>
              <div class="task-name">${q.customer} ${q.urgent ? '🔥' : ''}</div>
              <div class="task-meta">${q.jobType}</div>
              <div class="task-meta">${q.detail || '-'}</div>
            </div>
            <div class="task-right">
              <div class="tag">${q.channel}</div>
              <div class="task-meta" style="margin-top:6px;">📅 ${formatDateThai(q.deadline)}</div>
              <div class="task-meta">${q.status === 'done' ? 'เสร็จแล้ว' : q.status === 'serving' ? 'กำลังทำ' : 'รอคิว'}</div>
              ${adminActions}
            </div>
          </div>`;
        }).join('');
      }

      renderCalendar();
      renderCredits();
      applyView(state.view || 'list');
    }

    function setupEvents() {
      document.getElementById('navHome').addEventListener('click', () => showView('list'));
      document.getElementById('navCal').addEventListener('click', () => showView('calendar'));
      document.getElementById('navCredit').addEventListener('click', () => showView('credit'));
    }

    setupEvents();
    loadFromServer();
  </script>
</body>
</html>
